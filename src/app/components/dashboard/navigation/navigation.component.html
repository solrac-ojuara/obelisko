<nav style="background:#fff; border-bottom:1px solid #e5e7eb; position:sticky; top:0; z-index:50; box-shadow:0 1px 6px rgba(0,31,63,0.07)">
  <div style="max-width:1280px; margin:0 auto; padding:0 1.5rem; height:64px; display:flex; align-items:center; justify-content:space-between">

    <div style="display:flex; align-items:center; gap:10px">
      <div style="width:36px; height:36px; border-radius:8px; background:linear-gradient(135deg,#001F3F,#003D66); color:#FFD700; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1rem; flex-shrink:0">
        O
      </div>
      <span style="font-weight:700; font-size:1.1rem; color:#001F3F; letter-spacing:-0.01em">Obelisko</span>
    </div>

    <div style="display:flex; align-items:center; gap:10px" *ngIf="user">
      <div style="display:flex; align-items:center; gap:8px; padding:6px 12px; border-radius:8px; background:#f9fafb; border:1px solid #e5e7eb">
        <div style="width:28px; height:28px; border-radius:50%; background:#001F3F; color:#FFD700; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:700; flex-shrink:0">
          {{ user.email.charAt(0).toUpperCase() }}
        </div>
        <span style="font-size:0.85rem; color:#374151; font-weight:500; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">{{ user.email }}</span>
      </div>
      <button
        (click)="logout()"
        style="display:flex; align-items:center; gap:6px; font-size:0.85rem; font-weight:500; padding:6px 12px; border-radius:8px; border:1px solid #e5e7eb; background:#fff; color:#6b7280; cursor:pointer; transition:all 0.15s"
        onmouseover="this.style.color='#dc2626'; this.style.borderColor='#fca5a5'; this.style.background='#fff5f5'"
        onmouseout="this.style.color='#6b7280'; this.style.borderColor='#e5e7eb'; this.style.background='#fff'"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>

  </div>
</nav>
