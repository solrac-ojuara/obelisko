<h2 mat-dialog-title class="!text-base !font-semibold" style="color: #001F3F">
  Editar produto
</h2>

<mat-dialog-content class="!pt-2 !pb-0">
  <p class="text-sm text-gray-500 mb-4 truncate">{{ product.produto }}</p>

  <div class="flex flex-col gap-4">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Quantidade em estoque</mat-label>
      <input matInput type="number" min="0" [(ngModel)]="editQuantidade" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Valor unitário atual (R$)</mat-label>
      <input matInput type="number" min="0" step="0.01" [(ngModel)]="editValorAtual" />
      <mat-hint>
        Valor base NF-e: R$ {{ product.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 }) }}
      </mat-hint>
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions class="!flex !flex-col !gap-2 !px-6 !pb-6 !pt-4 !items-stretch">
  <div class="flex gap-2">
    <button mat-stroked-button mat-dialog-close class="flex-1">Cancelar</button>
    <button
      mat-flat-button
      (click)="save()"
      [disabled]="isSaving"
      class="flex-1"
      style="background-color: #001F3F; color: white;"
    >
      {{ isSaving ? 'Salvando...' : 'Salvar' }}
    </button>
  </div>

  <button
    mat-flat-button
    color="warn"
    (click)="deleteProduct()"
    [disabled]="isDeleting"
    class="w-full"
  >
    {{ isDeleting ? 'Removendo...' : 'Remover produto definitivamente' }}
  </button>
</mat-dialog-actions>
