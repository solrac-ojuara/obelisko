<div style="margin-bottom:2rem">
  <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem">

    <div>
      <p style="font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#F5C400; margin-bottom:4px">
        {{ todayFormatted }}
      </p>
      <h2 style="font-size:1.6rem; font-weight:800; color:#001F3F; margin:0; line-height:1.2">
        Dashboard de Estoque
      </h2>
      <p style="font-size:0.875rem; color:#9ca3af; margin-top:4px">
        Visualize e gerencie todo o seu inventário
      </p>
    </div>

    <button
      (click)="onAddPurchase()"
      style="display:inline-flex; align-items:center; gap:8px; font-size:0.875rem; font-weight:600; padding:10px 20px; border-radius:10px; border:none; background:linear-gradient(135deg,#FFD700,#F5C400); color:#001F3F; cursor:pointer; box-shadow:0 2px 8px rgba(245,196,0,0.35); transition:all 0.15s; white-space:nowrap"
      onmouseover="this.style.boxShadow='0 4px 14px rgba(245,196,0,0.45)'; this.style.transform='translateY(-1px)'"
      onmouseout="this.style.boxShadow='0 2px 8px rgba(245,196,0,0.35)'; this.style.transform='translateY(0)'"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Adicionar Compra
    </button>

  </div>
  <div style="margin-top:1.25rem; border-top:1px solid #e5e7eb"></div>
</div>
